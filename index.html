<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>בודק עוקצים בית"ר | מאגר רשמי</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet"> 

<script async src="https://www.googletagmanager.com/gtag/js?id=G-QQLFBE4FMZ"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-QQLFBE4FMZ');
</script> 

<style>
:root {
  --beitar-yellow: #fce300;
  --beitar-black: #121212;
  --text-light: #e0e0e0;
  --shadow-dark: rgba(0,0,0,0.8);
} 

* { box-sizing:border-box; margin:0; padding:0; } 

body {
  font-family: 'Heebo', sans-serif;
  direction: rtl;
  background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ2iO50d7vNOpKafNOLBfrE5ONhRFRZzLqNzRe8eU0FNJM17gKeq5qvjbBh&s=10');
  background-size: cover;
  background-position: center;
  display:flex; justify-content:center; align-items:center;
  min-height:100vh;
  color:var(--text-light);
} 

/* Splash */
#splashScreen{
  position:fixed; inset:0;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  background:#121212; z-index:9999; transition:opacity 0.6s;
}
#splashScreen img{ width:140px; margin-bottom:20px; animation:logoPop 0.8s ease;}
.loader{
  width:45px; height:45px; border:4px solid rgba(252,227,0,0.2);
  border-top:4px solid var(--beitar-yellow);
  border-radius:50%; animation:spin 1s linear infinite;
}
@keyframes logoPop{0%{transform:scale(0.7);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}} 

/* Main Card - הורחב ל-1200 פיקסלים לקריאה נוחה יותר */
.main-card{
  background: rgba(18,18,18,0.9);
  width: 95%; max-width:1200px; height:85vh;
  border-radius:22px; overflow:hidden;
  display:flex; flex-direction:column;
  box-shadow:0 20px 50px var(--shadow-dark);
} 

.top-bar{
  height:8px;
  background: linear-gradient(90deg,var(--beitar-yellow),#ffcc00,var(--beitar-yellow));
  background-size:200% 100%;
  animation: glowMove 4s linear infinite;
}
@keyframes glowMove{
  0%{background-position:0% 50%}
  100%{background-position:200% 50%}
} 

/* Header */
.header{ padding:20px; text-align:center; }
.header h1{
  font-size:2.3em; font-weight:900;
  color:var(--beitar-yellow);
  text-shadow:0 0 10px var(--beitar-yellow), 0 0 20px rgba(252,227,0,0.3);
} 

/* Chat */
#mainSection{ display:flex; flex-direction:column; height:100%; }
.chat-box{ flex-grow:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; }
.message{
  padding:12px 18px; border-radius:20px; max-width:90%;
  font-size:1.1em; white-space:pre-line; word-break:break-word;
  box-shadow:0 5px 20px rgba(0,0,0,0.5);
  opacity:0; transform:translateY(20px) scale(0.95); animation:messagePop 0.35s forwards;
}
@keyframes messagePop{
  0%{opacity:0; transform:translateY(20px) scale(0.95);}
  70%{opacity:1; transform:translateY(-3px) scale(1.02);}
  100%{opacity:1; transform:translateY(0) scale(1);}
} 

.user{ background:#333; color:white; align-self:flex-start; border-bottom-right-radius:6px; }
.bot{ background:var(--beitar-yellow); color:black; align-self:flex-end; border-bottom-left-radius:6px; font-weight:700; text-shadow:0 0 6px #fff2;} 

.highlight-match{ background:black; color:var(--beitar-yellow); padding:0 4px; border-radius:4px; } 

.copy-btn{
  display:block; margin-top:12px; padding:8px 16px; font-size:0.9em;
  background:black; color:var(--beitar-yellow); border:1px solid var(--beitar-yellow);
  border-radius:8px; cursor:pointer; font-weight:bold; transition:0.25s, transform 0.2s;
}
.copy-btn:hover{ transform:translateY(-2px) scale(1.05); box-shadow:0 6px 18px rgba(252,227,0,0.4); } 

.input-container{ padding:15px; background:rgba(0,0,0,0.6); display:flex; gap:10px; }
input{ flex:1; background:#252525; border:1px solid #444; padding:12px; border-radius:12px; color:white; outline:none; font-family:inherit; transition:0.3s; font-size: 1rem; }
input:focus{ border-color: var(--beitar-yellow); box-shadow:0 0 12px rgba(252,227,0,0.4);}
button#enterBtn{
  background:var(--beitar-yellow); color:black; border:none; padding:0 25px; border-radius:12px; font-weight:900; cursor:pointer;
  font-family:inherit; transition:0.25s; font-size: 1rem;
}
button#enterBtn:hover{ transform:translateY(-2px) scale(1.02); box-shadow:0 10px 25px rgba(252,227,0,0.5); } 

/* Actions */
.actions{ padding:15px; display:flex; justify-content:space-around; align-items:center; background:rgba(0,0,0,0.6); border-top:1px solid #333;}
.action-btn{ font-weight:bold; cursor:pointer; font-size:1em; display:flex; align-items:center; gap:5px; transition:0.2s; }
.action-btn:hover{ transform:scale(1.05);}
.report-trigger{ color:#ff4444; text-decoration:underline; }
.share-trigger{ color:var(--beitar-yellow); } 

/* Report Section */
#reportSection{ display:none; height:100%; }
iframe{ width:100%; height:calc(100% - 50px); border:none; }
.back-btn{ background:#000; color:var(--beitar-yellow); padding:12px; text-align:center; cursor:pointer; font-weight:bold; border-radius:8px; margin-bottom:10px; } 

/* Checking animation dots */
.checking::after{ display:inline-block; animation:dotsAnimation 1s steps(4,end) infinite; content:""; }
@keyframes dotsAnimation{0%{content:"";}25%{content:".";}50%{content:"..";}75%{content:"...";}100%{content:"";}}
</style>
</head>
<body> 

<div id="splashScreen">
  <img src="Bodek1Oktzim.png" alt="Logo">
  <div class="loader"></div>
</div> 

<div class="main-card">
  <div class="top-bar"></div>
  <div id="mainSection">
    <div class="header"><h1>בודק עוקצים בית"ר</h1></div>
    <div class="chat-box" id="chatBox">
      <div class="message bot">
ברוכים הבאים למאגר העוקצים הרשמי. 
• שלחו מספר טלפון או חלק ממנו (מינימום 3 ספרות) לבדיקה🔍 
• כתבו "רשימה" כדי לקבל את כל המספרים במאגר📋
• תמיד תזכרו שגם אם מספר כלשהו לא נמצא במאגר זה לא אומר שהוא אמין תמיד תהיו זהירים❗️
      </div>
    </div>
    <div class="input-container">
      <input type="text" id="userInput" placeholder="הקלד מספר טלפון..." autocomplete="off">
      <button id="enterBtn">בדוק</button>
    </div>
    <div class="actions">
      <span class="action-btn report-trigger" onclick="toggleReport(true)">⚠️ דווח על עוקץ</span>
      <span class="action-btn share-trigger" onclick="shareSite()">🔗 שיתוף המאגר</span>
    </div>
  </div> 

  <div id="reportSection">
    <div class="back-btn" onclick="toggleReport(false)">✖ חזור למסך הבדיקה</div>
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd-IDkaGSpzk8f5Vw1e8QhiFo_kBs7ID_ojhpdYoVLyT-rvpw/viewform?embedded=true"></iframe>
  </div>
</div> 

<script>
const sheetURL = 'https://docs.google.com/spreadsheets/d/18RfRhdFg1m_lNZecRXl9rLwaxRto_VtlkDjjI5B2gL4/gviz/tq?tqx=out:csv';
let phoneList = []; 

async function loadDatabase() {
  try {
    const response = await fetch(sheetURL);
    const data = await response.text();
    phoneList = data.split(/\r?\n/)
                   .map(num => num.replace(/[",]/g, "").trim())
                   .filter(num => num.length >= 3);
  } catch (error) {
    console.error("Error loading database:", error);
  }
}

function toggleReport(show){ document.getElementById('reportSection').style.display=show?'block':'none'; document.getElementById('mainSection').style.display=show?'none':'block'; }

function shareSite(){ if(navigator.share){ navigator.share({ title:'בודק עוקצים בית"ר', text:'כנסו לבדוק מספרי טלפון במאגר העוקצים הרשמי של בית"ר!', url:window.location.href }).catch(err=>console.log(err)); } else { navigator.clipboard.writeText(window.location.href); alert("הקישור הועתק ללוח!"); } }

function copyList(){ navigator.clipboard.writeText("⚠️ רשימת מספרי עוקץ:\n"+[...phoneList].sort().join('\n')).then(()=>alert("הרשימה הועתקה!")); } 

function addMessage(text,sender,showCopy=false){
  const div=document.createElement("div"); div.className=`message ${sender}`; div.innerHTML=text;
  if(showCopy){ const btn=document.createElement("button"); btn.className="copy-btn"; btn.innerText="📋 העתק רשימה"; btn.onclick=copyList; div.appendChild(btn); }
  const cb=document.getElementById("chatBox"); cb.appendChild(div); cb.scrollTop=cb.scrollHeight; return div;
} 

async function handleInput(){
  const input=document.getElementById("userInput"); const val=input.value.trim(); if(!val)return; addMessage(val,"user"); input.value="";
  const checkingMsg=addMessage("בודק","bot"); checkingMsg.classList.add("checking");
  await new Promise(r=>setTimeout(r,600)); checkingMsg.remove();
  
  if(val==="רשימה"){ 
    if(phoneList.length === 0) {
       addMessage("המערכת עדיין בטעינה, אנא נסו שוב בעוד רגע.", "bot");
    } else {
       addMessage("📊 מאגר מספרי העוקץ ("+phoneList.length+"):\n\n"+[...phoneList].sort().slice(0,5000).join('\n'),"bot",true);
    }
  }
  else{
    let normalized=val.replace(/[-\s]/g,''); 
    if(normalized.startsWith('+972')) normalized='0'+normalized.slice(4); 
    else if(normalized.startsWith('972')&&normalized.length>=12) normalized='0'+normalized.slice(3);
    const cleanNum=normalized.replace(/[^\d+]/g,''); 
    
    if(cleanNum.length<3) {
      addMessage("⚠️ החיפוש קצר מדי.","bot");
    }
    else {
      // בדיקה להתאמה מדויקת במספר מלא
      if(cleanNum.length >= 10 && phoneList.includes(cleanNum)) {
         addMessage(`המספר ${cleanNum} עוקץ ⚠️`, "bot");
      } 
      else {
        // חיפוש חלקי
        const matchesScam = phoneList.filter(p => p.includes(cleanNum));
        if(matchesScam.length > 0){ 
          let resultsHTML = `🚨 נמצאו התאמות עבור "${cleanNum}":\n\n`; 
          resultsHTML += matchesScam.map(p => p.split(cleanNum).join(`<span class="highlight-match">${cleanNum}</span>`)).join('<br>'); 
          addMessage(resultsHTML,"bot"); 
        } 
        else {
          addMessage(`המספר ${cleanNum} לא נמצא במאגר ❌️\n\nחשוב לזכור: לא בטוח שהוא אמין! תמיד תהיו זהירים.`,"bot");
        }
      }
    }
  }
} 

document.getElementById("enterBtn").onclick=handleInput;
document.getElementById("userInput").onkeypress=e=>{if(e.key==='Enter')handleInput();}

window.addEventListener("load", async () => {
  await loadDatabase();
  setTimeout(() => { 
    const splash = document.getElementById("splashScreen"); 
    splash.style.opacity = "0"; 
    setTimeout(() => splash.remove(), 600); 
  }, 1200); 
});
</script>
</body>
</html>
